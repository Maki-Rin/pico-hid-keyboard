[env:rpipico]
# platform は maxgerhardt 版を git URL で指定。
# バージョン固定なしのため、インストールタイミングで異なるコミットが入る場合がある。
# → framework-arduinopico のバージョンもそれに引きずられて変わる。
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
monitor_speed = 115200
upload_protocol = picotool

# tusb-hid のインクルードパスを環境に依存せず動的に解決するため extra_scripts を使う。
# pre: プレフィックスでコンパイル開始前に実行される。
# （build_flags で -I をハードコードすると、環境によってパスが変わり壊れる）
extra_scripts = pre:extra_script.py
